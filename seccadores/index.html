<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCADA Redesenhado</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
<div class="actions">
        
      </div>
    </div>

    <div class="board">
      <svg id="plant" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  
    <div class="operations-panel">
      <div class="panel-header">
        <h2>Em andamento</h2>
        <button id="addActionBtn" class="btn primary">Nova ação</button>
      </div>

      <div class="table-wrap">
        <table class="actions-table">
          <thead>
            <tr>
              <th>Origem</th>
              <th>Destino</th>
              <th>Início</th>
              <th>Duração</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="actionsTableBody">
            <tr class="empty-row">
              <td colspan="5">Nenhuma ação em andamento.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  
    <div class="operations-panel history-panel">
      <div class="panel-header">
        <h2>Histórico</h2>
      </div>

      <div class="table-wrap">
        <table class="actions-table">
          <thead>
            <tr>
              <th>Origem</th>
              <th>Destino</th>
              <th>Início</th>
              <th>Fim</th>
              <th>Duração</th>
            </tr>
          </thead>
          <tbody id="historyTableBody">
            <tr class="empty-row">
              <td colspan="5">Nenhuma ação finalizada.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="confirmModalBackdrop" class="modal-backdrop hidden">
    <div class="modal confirm-modal">
      <div class="modal-header">
        <h2>Finalizar ação</h2>
        <button id="closeConfirmModalBtn" class="close-btn" aria-label="Fechar">×</button>
      </div>

      <div class="modal-body">
        <p id="confirmText" class="hint">Deseja realmente finalizar esta ação?</p>
      </div>

      <div class="modal-footer">
        <button id="cancelConfirmBtn" class="btn ghost">Cancelar</button>
        <button id="confirmFinalizeBtn" class="btn danger">Finalizar</button>
      </div>
    </div>
  </div>

  <div id="actionModalBackdrop" class="modal-backdrop hidden">

    <div class="modal">
      <div class="modal-header">
        <h2>Nova ação em andamento</h2>
        <button id="closeActionModal" class="close-btn" aria-label="Fechar">×</button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <label for="actionOrigin">Origem</label>
          <select id="actionOrigin"></select>
        </div>

        <div class="form-row">
          <label for="actionDestination">Destino</label>
          <select id="actionDestination"></select>
        </div>
      </div>

      <div class="modal-footer">
        <button id="cancelActionBtn" class="btn ghost">Cancelar</button>
        <button id="saveActionBtn" class="btn primary">Adicionar</button>
      </div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nível do equipamento</h2>
        <button id="closeModal" class="close-btn" aria-label="Fechar">×</button>
      </div>

      <div class="modal-body">
        <p id="modalHint" class="hint"></p>

        <div class="form-row">
          <label for="levelRange">Nível (%)</label>
          <input id="levelRange" type="range" min="0" max="100" step="1" />
        </div>

        <div class="form-row">
          <label for="levelNumber">Valor exato</label>
          <div class="inline-input">
            <input id="levelNumber" type="number" min="0" max="100" step="1" />
            <span>%</span>
          </div>
        </div>

        <div class="form-row">
          <label for="humiditySelect">Umidade</label>
          <select id="humiditySelect">
            <option value="Seca">Seca</option>
            <option value="Úmida">Úmida</option>
          </select>
        </div>

        <div class="form-row">
          <label for="categorySelect">Categoria</label>
          <select id="categorySelect">
            <option value="Genética">Genética</option>
            <option value="Básica">Básica</option>
            <option value="C1">C1</option>
            <option value="C2">C2</option>
            <option value="S1">S1</option>
            <option value="S2">S2</option>
          </select>
        </div>

        <div class="form-row">
          <label for="notesInput">Observações</label>
          <textarea id="notesInput" rows="4" placeholder="Digite observações do equipamento"></textarea>
        </div>

        <div class="preview">
          <strong id="previewPercent">0%</strong>
          <span id="previewText"></span>
          <span id="previewMeta"></span>
        </div>
      </div>

      <div class="modal-footer">
        <button id="cancelBtn" class="btn ghost">Cancelar</button>
        <button id="saveBtn" class="btn primary">Salvar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
